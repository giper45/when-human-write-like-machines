experiment:
  name: main

is_pilot: false
batch_size: 32
seed: 42

paths:
  generated_dir: generated-texts
  sampled_file: ${experiment.paths.generated_dir}/${dataset.name}_sampled
  machine_file: ${experiment.paths.generated_dir}/${dataset.name}_${model.name}_${machine_postfix}.txt
  results_dir: results-aligned
  metrics_file: ${experiment.paths.results_dir}/${detector.model_name}_${dataset.name}_${model.name}_${machine_postfix}.npz
  output_dir: runs/main
  dataset_home_path: ${oc.env:HOME}/.datasets
  resolved_config: ${paths.output_dir}/resolved_config.yaml
  validated: ${paths.output_dir}/validated.parquet
  quality: ${paths.output_dir}/quality.parquet
  scores: ${paths.output_dir}/scores.parquet

  language: en
  openwebtext_topic_max_words: 40

filtering:
  min_words: 150
  max_words: 500
  batch_size: 32
  apply_word_length: true
  apply_artifact_filter: true
  apply_toxicity_filter: true
  apply_not_acceptable_filter: true




ranges:
  short:
    range: [150, 220]
    n_per_domain: 200
  medium:
    range: [221, 350]
    n_per_domain: 200
  long:
    range: [351, 500]
    n_per_domain: 200

split:
  by: sample_id
  calibration: 0.20
  test: 0.80
  seed: 42

regimes:
  - human
  - free_llm
  - h2l
  - llm2l

generation:
  backend: transformers
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  repeat_penalty: 1.05
  max_new_tokens: 512
  max_input_tokens: 4096
  seed: 42

validation:
  max_attempts: 3
  free_llm_words: [180, 420]
  h2l_ratio: [0.70, 1.40]
  llm2l_ratio: [0.70, 1.40]

# quality:
#   sbert_model: sentence-transformers/all-mpnet-base-v2
#   sbert_min_h2l: 0.80
#   bertscore_min_h2l: 0.85

# detectors:
#   - roberta_detector
#   - bert_detector
#   - radar
#   - fast
#   - binoculars

evaluation:
  metrics:
    - auroc
    - auprc
    - f1
    - precision
    - recall
    - tpr_at_fpr

  probabilistic_metrics:
    - ece
    - brier

  fpr_targets: [0.01]

  calibration_regimes:
    - free_llm
    - h2l
    - llm2l

  bootstrap:
    n: 5000
    unit: sample_id
    seed: 42
